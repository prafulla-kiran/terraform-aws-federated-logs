name: PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  # ──────────────────────────────────────────────────────────────
  # Setup — single source of truth for the module list
  # All matrix jobs read from here; add/rename modules in one place
  # ──────────────────────────────────────────────────────────────
  setup:
    name: Setup matrix
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.set-matrix.outputs.modules }}
    steps:
      - id: set-matrix
        run: |
          echo 'modules=["federated_logs_partition","federated_logs_role","federated_logs_setup_resource"]' >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────────────────────────
  # Job 1 — PR Title Lint
  # ──────────────────────────────────────────────────────────────
  lint-pr-title:
    name: Lint PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor

  # ──────────────────────────────────────────────────────────────
  # Job 2 — Terraform Validate (matrix: one runner per module)
  # ──────────────────────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate — ${{ matrix.module }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.setup.outputs.modules) }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "~> 1.6"

      - name: Terraform Format Check
        run: terraform fmt -check
        working-directory: modules/${{ matrix.module }}

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: modules/${{ matrix.module }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: modules/${{ matrix.module }}

  # ──────────────────────────────────────────────────────────────
  # Job 3 — TFLint (matrix: one runner per module)
  # ──────────────────────────────────────────────────────────────
  tflint:
    name: TFLint — ${{ matrix.module }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.setup.outputs.modules) }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4.1.1
        with:
          tflint_version: v0.54.0

      - name: Init TFLint (with AWS ruleset)
        run: tflint --init
        working-directory: modules/${{ matrix.module }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint
        run: tflint --format compact
        working-directory: modules/${{ matrix.module }}

  # ──────────────────────────────────────────────────────────────
  # Job 4 — Terraform Tests (matrix: one runner per module)
  # Requires Terraform >= 1.6.0 for `terraform test`
  # No AWS credentials needed — tests use mock_provider "aws"
  # ──────────────────────────────────────────────────────────────
  terraform-test:
    name: Terraform Test — ${{ matrix.module }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.setup.outputs.modules) }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "~> 1.6"

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: modules/${{ matrix.module }}

      - name: Terraform Test
        run: terraform test
        working-directory: modules/${{ matrix.module }}

  # ──────────────────────────────────────────────────────────────
  # Job 5 — Security Scan (single runner, entire repo)
  # ──────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run Trivy (IaC scan)
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # v0.30.0
        with:
          scan-type: config
          scan-ref: modules/
          exit-code: 1
          severity: CRITICAL

  # ──────────────────────────────────────────────────────────────
  # Job 6 — Validate Commit Messages (conventional commits)
  # Fails the job and prints offending commits to the run log
  # ──────────────────────────────────────────────────────────────
  validate-commits:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Check commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          base_sha=$(git merge-base "$BASE_SHA" "$HEAD_SHA")
          invalid_commits=""

          while read -r commit; do
            commit_msg=$(git log -1 --format=%B "$commit")
            if ! echo "$commit_msg" | grep -qP '^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-z0-9-]+\))?: .+$'; then
              commit_info="$(git log -1 --format='%H - %s' "$commit")"
              invalid_commits="$invalid_commits\n- $commit_info"
            fi
          done < <(git rev-list "$base_sha".."$HEAD_SHA")

          if [ -n "$invalid_commits" ]; then
            echo "The following commits do not follow the Conventional Commits format:"
            echo -e "$invalid_commits"
            echo ""
            echo "Required format: <type>[optional scope]: <description>"
            echo "Valid types: build, chore, ci, docs, feat, fix, perf, refactor, revert, style, test"
            exit 1
          fi

  # ──────────────────────────────────────────────────────────────
  # Job 7 — Spell Check
  # ──────────────────────────────────────────────────────────────
  codespell:
    name: Check spelling
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: codespell-project/actions-codespell@8f01853be192eb0f849a5c7d721450e7a467c579 # v2.2
        with:
          check_filenames: true
          check_hidden: true
          skip: ./.git
          ignore_words_list: enver,NotIn,aks,commitish
