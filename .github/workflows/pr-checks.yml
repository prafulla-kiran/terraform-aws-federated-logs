name: PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  # ──────────────────────────────────────────────────────────────
  # Setup
  # ──────────────────────────────────────────────────────────────
  setup:
    name: Setup matrix
    runs-on: ubuntu-latest
    outputs:
      paths: ${{ steps.set-matrix.outputs.paths }}
    steps:
      - id: set-matrix
        run: |
          echo 'paths=[{"name":"root","path":"."},{"name":"examples-complete","path":"examples/complete"},{"name":"federated_logs_partition","path":"modules/federated_logs_partition"},{"name":"federated_logs_role","path":"modules/federated_logs_role"},{"name":"federated_logs_setup_resource","path":"modules/federated_logs_setup_resource"}]' >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────────────────────────
  # PR Title Lint
  # ──────────────────────────────────────────────────────────────
  lint-pr-title:
    name: Lint PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor

  # ──────────────────────────────────────────────────────────────
  # Terraform Validate
  # ──────────────────────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate — ${{ matrix.path.name }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        path: ${{ fromJson(needs.setup.outputs.paths) }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.12.0"

      - name: Terraform Format Check
        run: terraform fmt -check
        working-directory: ${{ matrix.path.path }}

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ${{ matrix.path.path }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ matrix.path.path }}

  # ──────────────────────────────────────────────────────────────
  # TFLint
  # ──────────────────────────────────────────────────────────────
  tflint:
    name: TFLint — ${{ matrix.path.name }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        path: ${{ fromJson(needs.setup.outputs.paths) }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4.1.1
        with:
          tflint_version: v0.54.0

      - name: Copy TFLint config
        if: matrix.path.path != '.'
        run: |
          if [ -f ".tflint.hcl" ] && [ ! -f "${{ matrix.path.path }}/.tflint.hcl" ]; then
            cp .tflint.hcl "${{ matrix.path.path }}/.tflint.hcl"
          fi

      - name: Init TFLint (with AWS ruleset)
        run: tflint --init
        working-directory: ${{ matrix.path.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint
        run: tflint --format compact
        working-directory: ${{ matrix.path.path }}

  # ──────────────────────────────────────────────────────────────
  # Security Scan
  # ──────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run Trivy (IaC scan)
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # v0.30.0
        with:
          scan-type: config
          scan-ref: .
          exit-code: 1
          severity: CRITICAL

  # ──────────────────────────────────────────────────────────────
  # Validate Commit Messages
  # ──────────────────────────────────────────────────────────────
  validate-commits:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Check commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          base_sha=$(git merge-base "$BASE_SHA" "$HEAD_SHA")
          invalid_commits=""

          while read -r commit; do
            commit_msg=$(git log -1 --format=%B "$commit")
            if ! echo "$commit_msg" | grep -qP '^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-z0-9-]+\))?: .+$'; then
              commit_info="$(git log -1 --format='%H - %s' "$commit")"
              invalid_commits="$invalid_commits\n- $commit_info"
            fi
          done < <(git rev-list --no-merges "$base_sha".."$HEAD_SHA")

          if [ -n "$invalid_commits" ]; then
            echo "The following commits do not follow the Conventional Commits format:"
            echo -e "$invalid_commits"
            echo ""
            echo "Required format: <type>[optional scope]: <description>"
            echo "Valid types: build, chore, ci, docs, feat, fix, perf, refactor, revert, style, test"
            exit 1
          fi

  # ──────────────────────────────────────────────────────────────
  # Spell Check
  # ──────────────────────────────────────────────────────────────
  codespell:
    name: Check spelling
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: codespell-project/actions-codespell@8f01853be192eb0f849a5c7d721450e7a467c579 # v2.2
        with:
          check_filenames: true
          check_hidden: true
          skip: ./.git
          ignore_words_list: enver,NotIn,aks,commitish