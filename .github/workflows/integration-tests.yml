name: Integration Tests

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_VAR_test_run_id: ${{ github.run_id }}

jobs:
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.0"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TEST_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Run Setup Resource Tests
        run: terraform test -filter=tests/setup_resource.tftest.hcl
        continue-on-error: false

      - name: Run Data Processing Tests
        run: terraform test -filter=tests/data_processing.tftest.hcl
        continue-on-error: false

      - name: Run Role Tests
        run: terraform test -filter=tests/role.tftest.hcl
        continue-on-error: false

      - name: Run Partition Tests
        run: terraform test -filter=tests/partition.tftest.hcl
        continue-on-error: false

      - name: Run E2E Integration Tests (Go)
        working-directory: tests/integration
        env:
          NEW_RELIC_API_KEY:      ${{ secrets.NEW_RELIC_TEST_API_KEY }}
          NEW_RELIC_LICENSE_KEY:  ${{ secrets.NEW_RELIC_TEST_LICENSE_KEY }}
          NEW_RELIC_ACCOUNT_ID:   ${{ secrets.NEW_RELIC_TEST_ACCOUNT_ID }}
          TEST_FLEET_ENTITY_GUID: ${{ secrets.NEW_RELIC_TEST_FLEET_ENTITY_GUID }}
          TEST_NR_ORG_ID:         ${{ secrets.NEW_RELIC_TEST_ORG_ID }}
        run: go test -v -timeout 60m ./...
        continue-on-error: false

      - name: Cleanup orphaned AWS test resources
        if: always()
        run: |
          echo "Sweeping for AWS orphans by prefix..."
          ./scripts/cleanup-test-resources.sh

      - name: Cleanup orphaned NR test entities
        if: always()
        env:
          NEW_RELIC_API_KEY: ${{ secrets.NEW_RELIC_TEST_API_KEY }}
        run: |
          echo "Sweeping for NR entity orphans..."
          ./scripts/cleanup-test-nr-entities.sh US "inttest-e2e-"
